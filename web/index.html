<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UOMapVibe — AI Map Editor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="app">
        <div id="map"></div>

        <div id="sidebar">
            <h2>UOMapVibe</h2>

            <div class="section">
                <h3>Annotations</h3>
                <p class="hint">Draw shapes on the map, then add labels describing your intent.</p>
                <div id="annotation-list"></div>
                <button id="btn-clear-annotations" class="btn btn-secondary">Clear All</button>
            </div>

            <div class="section">
                <h3>Actions</h3>
                <div class="action-buttons">
                    <button id="btn-prepare" class="btn btn-primary" disabled>Prepare for AI</button>
                    <button id="btn-copy" class="btn btn-primary" disabled>Copy for AI</button>
                    <button id="btn-execute" class="btn btn-warning" disabled>Execute Commands</button>
                </div>
            </div>

            <div class="section">
                <h3>Style Preview</h3>
                <div id="style-preview" class="preview-box">
                    <p class="hint">Click "Prepare" to analyze nearby building styles.</p>
                </div>
            </div>

            <div class="section">
                <h3>Execute Commands</h3>
                <textarea id="command-input" placeholder='Paste command JSON here...\n[{"op":"place","itemId":2600,"x":1440,"y":1700,"z":0}]' rows="6"></textarea>
                <button id="btn-run-commands" class="btn btn-warning">Run Commands</button>
            </div>

            <div class="section">
                <h3>Snapshots</h3>
                <div id="snapshot-list"></div>
                <button id="btn-refresh-snapshots" class="btn btn-secondary">Refresh</button>
            </div>

            <div class="section">
                <h3>Item Search</h3>
                <input type="text" id="catalog-search" placeholder="Search items (e.g. stone wall)..." />
                <div id="catalog-results"></div>
            </div>

            <div id="status-bar">
                <span id="coords">X: 0, Y: 0</span>
                <span id="status-msg"></span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="js/app.js"></script>
    <script src="js/annotationTools.js"></script>
    <script src="js/stylePreview.js"></script>
    <script src="js/enrichment.js"></script>
    <script src="js/export.js"></script>
    <script src="js/executor.js"></script>
    <script src="js/tileBrowser.js"></script>
</body>
</html>
